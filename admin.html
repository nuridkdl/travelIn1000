<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - Incheon Travel</title>
    <link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.css" />
    <!-- Reusing some common variables from style.css -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .flatpickr-calendar { font-family: var(--font-primary) !important; border-radius: var(--radius-md) !important; border: none !important; box-shadow: 0 10px 25px rgba(0,0,0,0.1) !important; }
        .flatpickr-day.selected { background: var(--color-primary) !important; border-color: var(--color-primary) !important; }
    </style>
</head>
<body class="admin-body">
    <div class="admin-layout">
        <!-- Radial Palette Navigation (Reduced to 3 Items) -->
        <nav class="radial-nav" id="radial-nav">
            <div class="radial-items">
                <a href="index.html" class="radial-item" id="radial-btn-app">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span class="radial-label">앱으로</span>
                </a>
                <button class="radial-item active" id="radial-btn-board" data-target="manage-board">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    <span class="radial-label">게시판 관리</span>
                </button>
                <button class="radial-item" id="radial-btn-logout" style="color: #ef4444; border-color: #fca5a5;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span class="radial-label">로그아웃</span>
                </button>
            </div>
            <button class="radial-toggle" id="sidebar-toggle">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </nav>

        <!-- Main Content Area -->
        <main class="admin-main">
            <header class="admin-topbar">
                <div style="display: flex; flex-direction: column; justify-content: center; gap: 4px;">
                    <h1 style="margin: 0; line-height: 1.2;">콘텐츠 관리 시스템</h1>
                    <div class="admin-profile" style="line-height: 1.2;">관리자 님 환영합니다</div>
                </div>
            </header>

            <div class="admin-content-inner">
                
                <!-- Board Management (Combined Tabs) -->
                <section id="manage-board" class="admin-section active-section">
                    
                    <div class="board-tabs-wrapper">
                        <div class="board-tabs">
                            <button class="board-tab active" data-sub="sub-routes">여행경로 관리</button>
                            <button class="board-tab" data-sub="sub-coupons">쿠폰 관리</button>
                        </div>
                    </div>

                    <!-- Sub Section 1: Routes -->
                    <div id="sub-routes" class="board-sub active-sub">
                    <div class="split-layout">
                        <div class="card panel">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                                <h3 id="form-route-title" style="margin-bottom:0;">신규 여행경로 등록</h3>
                                <button type="button" class="btn-primary" style="background:var(--color-light); color:var(--color-primary); padding:6px 12px; font-size:0.85rem;" onclick="cancelRouteEdit()">+ 신규 등록</button>
                            </div>
                        <form id="form-route" class="admin-form">
                            <div class="form-group">
                                <label>제목</label>
                                <input type="text" id="route-title" placeholder="예: 송도 센트럴파크 산책" required>
                            </div>
                            <div class="form-group row">
                                <div class="col">
                                    <label>태그</label>
                                    <div style="display:flex; gap:8px; margin-bottom:8px;">
                                        <input type="text" id="route-tag-input" placeholder="예: 도심여행 (엔터로 추가)" style="flex:1;">
                                        <button type="button" id="btn-add-tag" class="btn-primary" style="padding:0 16px; font-size:0.9rem; white-space:nowrap;">추가</button>
                                    </div>
                                    <div id="route-tags-display" style="display:flex; flex-wrap:wrap; gap:6px; min-height:28px;"></div>
                                </div>
                                <div class="col">
                                    <label>경로 단계 수</label>
                                    <select id="route-step-count" required>
                                        <option value="3">3단계</option>
                                        <option value="4">4단계</option>
                                        <option value="5">5단계</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group" style="padding:16px; background:var(--color-bg); border-radius:8px; border:1px solid var(--color-border);">
                                <label style="margin-bottom:12px; font-size:1.05rem; color:var(--color-primary);">경로 상세 내역</label>
                                <div id="route-steps-container" style="display:flex; flex-direction:column; gap:16px;"></div>
                            </div>
                            <div class="form-actions" style="display:flex; gap:12px;">
                                <button type="submit" id="btn-submit-route" class="btn-primary" style="flex:1;">등록하기</button>
                            </div>
                        </form>
                    </div>

                        <div class="card panel">
                            <h3>등록된 경로 목록</h3>
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>태그</th>
                                        <th>제목</th>
                                        <th>관리</th>
                                    </tr>
                                </thead>
                                <tbody id="tbody-routes">
                                </tbody>
                            </table>
                        </div>
                    </div>
                    </div>

                    <!-- Sub Section 2: Coupons -->
                    <div id="sub-coupons" class="board-sub">
                    <div class="split-layout">
                        <div class="card panel">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                                <h3 id="form-coupon-title" style="margin-bottom:0;">신규 쿠폰 등록</h3>
                                <button type="button" class="btn-primary" style="background:var(--color-light); color:var(--color-primary); padding:6px 12px; font-size:0.85rem;" onclick="cancelCouponEdit()">+ 신규 등록</button>
                            </div>
                        <form id="form-coupon" class="admin-form">
                            <div class="form-group row">
                                <div class="col">
                                    <label>할인 내용 (예: 20%, 10천원)</label>
                                    <input type="text" id="coupon-discount" placeholder="20%" required>
                                </div>
                                <div class="col">
                                    <label>타입 (예: 할인, 쿠폰)</label>
                                    <input type="text" id="coupon-type" placeholder="할인">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>쿠폰 제목</label>
                                <input type="text" id="coupon-title" placeholder="예: 차이나타운 카페 음료 할인" required>
                            </div>
                            <div class="form-group row">
                                <div class="col">
                                    <label>사용 조건</label>
                                    <select id="coupon-cond" required>
                                        <option value="당일 사용">당일 사용</option>
                                        <option value="장소 방문 인증">장소 방문 인증</option>
                                        <option value="사진 인증">사진 인증</option>
                                    </select>
                                </div>
                                <div class="col">
                                    <label>유효 기간</label>
                                    <input type="date" id="coupon-date" class="large-date-picker" required>
                                </div>
                            </div>
                            <div class="form-actions" style="display:flex; gap:12px;">
                                <button type="submit" id="btn-submit-coupon" class="btn-primary" style="flex:1;">등록하기</button>
                            </div>
                        </form>
                    </div>

                    <div class="card panel">
                        <h3>등록된 쿠폰 목록</h3>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>타입/할인</th>
                                    <th>제목</th>
                                    <th>관리</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-coupons">
                            </tbody>
                        </table>
                    </div>
                    </div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ko.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
