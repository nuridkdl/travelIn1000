<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Incheon Travel</title>
    <link rel="stylesheet" as="style" crossorigin href="https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.css" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg);
            padding: 20px;
        }
        .auth-card {
            background-color: var(--color-surface);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 25px rgba(29, 78, 216, 0.05);
            border: 1px solid var(--color-border);
        }
        .auth-title {
            font-size: 1.5rem;
            color: var(--color-primary);
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        .auth-subtitle {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            margin-bottom: 30px;
            text-align: center;
        }
        /* Tabs for Signup Type */
        .signup-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--color-border);
        }
        .signup-tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            font-weight: 600;
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .signup-tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s forwards;
        }
        .tab-content.active {
            display: block;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-wrap {
            text-align: left;
        }
        .input-wrap label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text-main);
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background-color: var(--color-bg);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-light);
            background-color: var(--color-surface);
        }
        .btn-auth {
            width: 100%;
            padding: 16px;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .btn-auth:hover {
            background-color: var(--color-secondary);
        }

        .sns-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }
        .btn-sns {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid var(--color-border);
            transition: transform 0.2s;
        }
        .btn-sns:hover { transform: translateY(-2px); }
        .btn-kakao { background-color: #FEE500; color: #000; border-color: #FEE500; }
        .btn-naver { background-color: #03C75A; color: #fff; border-color: #03C75A; }
        .btn-google { background-color: white; color: #333; }
        
        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }
        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-card">
            <h1 class="auth-title">회원가입</h1>
            <p class="auth-subtitle">인천 여행 멤버십에 가입하세요.</p>
            
            <div class="signup-tabs">
                <div class="signup-tab active" data-target="tab-general">일반 회원가입</div>
                <div class="signup-tab" data-target="tab-sns">SNS 간편가입</div>
            </div>

            <!-- General Signup Form -->
            <div id="tab-general" class="tab-content active">
                <form id="signup-form" class="auth-form">
                    <div class="input-wrap">
                        <label>이메일</label>
                        <input type="email" class="input-field" placeholder="example@email.com" required>
                    </div>
                    <div class="input-wrap">
                        <label>비밀번호</label>
                        <input type="password" class="input-field" placeholder="8자리 이상 영문자/숫자 조합" required>
                    </div>
                    <div class="input-wrap">
                        <label>비밀번호 확인</label>
                        <input type="password" class="input-field" placeholder="비밀번호 재입력" required>
                    </div>
                    <div class="input-wrap">
                        <label>이름 (닉네임)</label>
                        <input type="text" class="input-field" placeholder="사용하실 닉네임을 입력하세요" required>
                    </div>
                    <button type="submit" class="btn-auth">가입 완료</button>
                </form>
            </div>

            <!-- SNS Signup Form -->
            <div id="tab-sns" class="tab-content">
                <p style="text-align: center; color: var(--color-text-muted); font-size: 0.9rem; margin-bottom: 8px;">자주 사용하는 계정으로 1초 만에 가입하세요.</p>
                <div class="sns-buttons">
                    <button class="btn-sns btn-kakao" onclick="mockSnsSignup('kakao')">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 4C7.03 4 3 7.218 3 11.188c0 2.551 1.706 4.786 4.316 6.096l-1.096 4.098c-.12.448.204.536.5.34l4.646-3.085c.21.01.423.015.634.015 4.97 0 9-3.218 9-7.188S16.97 4 12 4M3.77 15.626"/></svg>
                        카카오로 시작하기
                    </button>
                    <button class="btn-sns btn-naver" onclick="mockSnsSignup('naver')">
                        <span style="font-weight: 900; font-size: 1.25rem; line-height:1;">N</span>
                        네이버로 시작하기
                    </button>
                    <button class="btn-sns btn-google" onclick="mockSnsSignup('google')">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="color:#DB4437"><path d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81Z"/></svg>
                        구글로 시작하기
                    </button>
                </div>
            </div>

            <div class="auth-footer">
                이미 계정이 있으신가요? <a href="login.html">로그인하기</a>
            </div>
        </div>
    </div>

    <script>
        // Tab switching logic for Signup
        const tabs = document.querySelectorAll('.signup-tab');
        const contents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                contents.forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(tab.getAttribute('data-target')).classList.add('active');
            });
        });

        // General Signup handling
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('currentUser', 'general');
            alert('일반 이메일 회원가입이 완료되었습니다!\n환영합니다.');
            window.location.href = 'index.html';
        });

        // SNS Signup handling
        function mockSnsSignup(provider) {
            localStorage.setItem('currentUser', 'general');
            localStorage.setItem('snsProvider', provider);
            alert(`[${provider.toUpperCase()}] 계정으로 회원가입이 완료되었습니다!\n환영합니다.`);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
